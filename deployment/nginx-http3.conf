# Experimental HTTP/3 (QUIC) listener for read-only OIDC endpoints.
#
# Use alongside nginx.conf. Apply selectively to /.well-known/openid-configuration
# and /oidc/v1/jwks where idempotent, cacheable responses benefit from QUIC's
# faster handshake. Requires nginx built with --with-http_v3_module.

server {
    listen 443 quic reuseport;
    listen 443 ssl;
    http2 on;
    http3 on;
    server_name id.example.com;

    ssl_certificate     /etc/ssl/parako/fullchain.pem;
    ssl_certificate_key /etc/ssl/parako/privkey.pem;
    ssl_protocols       TLSv1.3;

    add_header Alt-Svc 'h3=":443"; ma=86400' always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    location = /.well-known/openid-configuration {
        proxy_pass http://parako_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /oidc/v1/jwks {
        proxy_pass http://parako_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 421;
    }
}
