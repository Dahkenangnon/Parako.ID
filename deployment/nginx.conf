# Sample nginx configuration for Parako.ID.
#
# Verified against nginx 1.27 and the application's HTTP server settings.
# Adjust paths, hostnames, and TLS certificate locations to the target host.

upstream parako_upstream {
    server 127.0.0.1:9007;

    # Connection pooling to the Node.js application. keepalive_timeout must
    # exceed the application's HARDENING.timeouts.keepAliveMs so that nginx
    # does not hold a connection past the moment Node would close it.
    keepalive 32;
    keepalive_timeout 75s;
}

server {
    listen 443 ssl;
    http2 on;
    server_name id.example.com;

    # TLS profile (Mozilla "Intermediate").
    ssl_certificate     /etc/ssl/parako/fullchain.pem;
    ssl_certificate_key /etc/ssl/parako/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HTTP Strict Transport Security. Enable after confirming the certificate
    # chain and renewal automation are working end-to-end.
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Body size cap large enough for branding uploads (matches multer limits).
    client_max_body_size 8m;

    # Standard reverse-proxy headers. trust_proxy_hops in the application
    # configuration must match the number of trusted hops in front of nginx.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # Pool keepalive connections to the application upstream.
    proxy_http_version 1.1;
    proxy_set_header   Connection "";

    # Aligns with HARDENING.timeouts.requestMs (300s) plus a small grace.
    proxy_read_timeout 305s;
    proxy_send_timeout 305s;

    # The service-worker file requires an explicit Service-Worker-Allowed
    # header when served under the root scope. Cache-Control disables
    # stale-revalidation so a new worker is picked up on the next page load.
    location = /service-worker.js {
        add_header Service-Worker-Allowed "/" always;
        add_header Cache-Control          "public, no-cache" always;
        proxy_pass http://parako_upstream;
    }

    # The asset manifest is regenerated on every build; downstream consumers
    # must revalidate to avoid pinning a stale build identifier.
    location = /manifest.json {
        add_header Cache-Control "public, no-cache" always;
        proxy_pass http://parako_upstream;
    }

    # Hashed static assets: Cache-Control is already set by the application
    # (max-age=1y, immutable). Do not override here.
    location / {
        proxy_pass http://parako_upstream;
    }
}

# Multi-tenant deployments serving multiple subdomains from this server must
# include $host in any proxy_cache_key directive added downstream so cached
# representations are not shared across tenants.
