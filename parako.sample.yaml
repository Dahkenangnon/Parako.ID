integrations:
  email:
    smtp_host: your-smtp-host
    smtp_port: 587
    smtp_username: your-email@example.com
    smtp_password: ${SMTP_PASSWORD:-}
    from: your-email@example.com
  urls:
    website: http://localhost:9007
    privacy_policy: http://localhost:9007/privacy
    terms_of_service: http://localhost:9007/terms
    contact: http://localhost:9007/contact
  ipinfo:
    enabled: false
    cache_ttl_hours: 24
  ipqualityscore:
    enabled: false
    fraud_score_threshold: 75
    cache_ttl_hours: 6
  fingerprintjs:
    enabled: false
notifications:
  channels:
    email:
      enabled: true
    sms:
      enabled: false
  defaults:
    security_alerts: true
    new_session_alerts: true
    allow_user_preferences: true
