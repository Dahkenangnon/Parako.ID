          unauthorized: custom/error/401.njk
          forbidden: custom/error/403.njk
          notfound: custom/error/404.njk
          server_error: custom/error/500.njk
          rate_limit: custom/error/rate-limit-inline.html
        email:
          mail: custom/email/mail.njk
        home:
          index: custom/home/index.njk
deployment:
  url: http://localhost:9007
  server:
    allowed_origins: '*'
    proxy: false
  redis_prefix: parako
  cookies:
    defaults:
      maxAge: 31536000000
      httpOnly: true
      secure: false
      sameSite: lax
      path: /
    types:
      session:
        name: application_session
        maxAge: 86400000
        httpOnly: true
        secure: false
        sameSite: lax
      locale:
        name: locale
        maxAge: 31536000000
        httpOnly: true
        secure: false
        sameSite: lax
      theme:
        name: theme
        maxAge: 31536000000
        httpOnly: true
        secure: false
        sameSite: lax
  routes:
    auth: /auth
    accounts: /accounts
    api: /api/v1
    home: /
    auth_routes:
      login: /login
      register: /register
      forgot_password: /forgot-password
      reset_password: /reset-password
      email_verification: /email-verification
      verify_email: /verify-email
      email_verification_success: /email-verification-success
      account_select: /account-select
      continue: /continue
      multi_factor: /multi-factor
      mfa_verify: /mfa-verify
      mfa_resend: /mfa-resend
      mfa_select: /mfa-select
      mfa_webauthn: /mfa-webauthn
      logout: /logout
      social_password_setup: /social-password-setup
      social_contact_info: /social-contact-info
      account_recovery: /account-recovery
      recovery_method_select: /recovery-method-select
      recovery_backup_codes: /recovery-backup-codes
      recovery_secondary_email: /recovery-secondary-email
      recovery_security_questions: /recovery-security-questions
      recovery_sms: /recovery-sms
      recovery_verify_code: /recovery-verify-code
      update_theme: /update-theme
      update_locale: /update-locale
      update_sidebar: /update-sidebar
      update_timezone: /update-timezone
    account_routes:
      dashboard: /
      my_account: /my-account
      settings: /settings
      apps: /apps
      sessions: /sessions
      update_profile: /update-profile
      change_password: /change-password
      remove_avatar: /remove-avatar
      enable_mfa: /enable-mfa
      disable_mfa: /disable-mfa
      setup_mfa: /setup-mfa
      setup_webauthn: /setup-webauthn
      passkeys: /passkeys
      switch_account: /switch-account
      add_account: /add-account
      remove_account: /remove-account
      account_switcher_data: /account-switcher-data
      revoke_app: /revoke-app
      revoke_all_apps: /revoke-all-apps
      logout_session: /logout-session
      logout_all_other_sessions: /logout-all-other-sessions
      resend_email_verification: /resend-email-verification
      enable_recovery: /enable-recovery
      disable_recovery: /disable-recovery
      recovery_codes: /recovery-codes
      verify_recovery_email: /verify-recovery-email
      regenerate_backup_codes: /regenerate-backup-codes
      recovery_setup: /recovery-setup
      security_questions_setup: /security-questions/setup
      update_notification_preferences: /update-notification-preferences
    api_routes:
      base: /
security:
  secrets:
    jwt_secret: ${JWT_SECRET}
    jwt_expires_in: 1h
    cookie_secrets:
      - ${COOKIE_SECRET_1}
      - ${COOKIE_SECRET_2}
    hmac_secret: ${HMAC_SECRET} # Cross-tenant OAuth state signing
  protection:
    rate_limiting:
      enabled: true
      requests_per_minute: 100
      window_minutes: 15
    trusted_domains: []
    trusted_proxies: []
    high_risk_countries: []
    encrypt_device_data: false
    device_matching:
      min_confidence_score: 70
      ip_similarity_threshold: 0.8
      enable_impossible_travel: true
      impossible_travel_max_speed_kmh: 900
      trust_duration_days: 30
  key_store:
    type: database # "database" (encrypted at rest) or "file" (runtime/jwks/jwks.json)
    rotation_interval_days: 90
    overlap_window_seconds: 7200
    algorithms:
      - RS256
      - ES256
      - EdDSA
    promotion_delay_ms: 0 # 0 = immediate promotion (single-cluster), >0 = delayed (distributed)
  authentication:
    multi_factor:
      enabled: true
      totp:
        enabled: true
        issuer_name: OIDC Provider
      email:
        enabled: true
        code_ttl_seconds: 600
      sms:
        enabled: false
      webauthn:
        enabled: false
        rp_name: OIDC Provider
        rp_id: localhost
        timeout: 60000
        attestation: none
        user_verification: preferred
        resident_key: preferred
        max_credentials_per_user: 10
    session_management:
      multiple_accounts:
        enabled: true
    session:
      cookie_name: application_session
      same_site: lax
      bind_ip: false
      bind_user_agent: false
      bind_device: false
      idle_timeout_minutes: 30
      absolute_timeout_hours: 24
      max_concurrent_sessions: 0
      max_accounts_per_session: 5
      encrypt_session_data: false
      notify_new_session: false
      require_reauth_on_switch: false
      max_flash_messages_per_type: 10
      max_flash_messages_total: 20
      require_2fa_for_new_device: false
      new_device_2fa_method: auto
      new_device_confidence_threshold: 70
      store_metadata: false
    login:
      login_methods:
        - email+password
        - phone+password
      password_policy:
        min_length: 8
        require_uppercase: true
        require_lowercase: true
        require_numbers: true
        require_symbols: false
        max_age_days: 90
    signup:
      signup_methods:
        - email+password+full_name
        - phone_number+password+full_name
      require_email_verification: false
      require_phone_verification: false
      auto_approval:
        enabled: true
        domains_whitelist: []
      contact_channels:
        require_at_least_one: true
        email:
          enabled: true
          required: false
        phone:
          enabled: true
          required: false
    roles:
      available:
        - user
        - admin
        - superadmin
      default: user
    custom_identifiers:
      enabled: false
      fields: []
      # Example field:
      # - slot: 1
      #   key: matricule
      #   name: Matricule
      #   hint_for_user: Enter your matricule number
      #   validation_type: regex
      #   pattern: "^[A-Z]{2}\\d{6}$"
      #   min_length: 3
      #   max_length: 30
      #   case_sensitive: false
      #   required_for_registration: false
      #   edit_policy: set_once
      #   usable_for_login: true
    recovery:
      enabled: true
      backup_codes:
        enabled: true
        count: 10
        expiry_days: 365
      secondary_email:
        enabled: true
      sms:
        enabled: false
      security_questions:
        enabled: false
    password_breach_detection:
      enabled: true
      api_timeout_ms: 3000
      check_on_registration: true
      check_on_login: true
      check_on_password_reset: true
      check_on_password_change: true
      min_breach_count: 1
features:
  oidc:
    dev_interactions:
      enabled: false
    device_flow:
      enabled: true
      charset: digits
      mask: '***-*-***'
    client_credentials:
      enabled: true
    token_revocation:
      enabled: true
    token_introspection:
      enabled: true
    jwt_introspection:
      enabled: false
    userinfo_endpoint:
      enabled: true
    resource_indicators:
      enabled: true
    rp_initiated_logout:
      enabled: true
    backchannel_logout:
      enabled: true
    dynamic_client_registration:
      enabled: false
      require_initial_access_token: false
      issue_registration_access_token: false
    client_registration_management:
      enabled: false
      rotate_registration_access_token: false
    pkce:
      enabled: true
      required: true
    extra_params:
      enabled: true
      allowed_params:
        - utm_source
        - utm_medium
        - utm_campaign
        - utm_term
        - utm_content
        - tenant_id
        - app_id
        - continue
    accept_query_param_access_tokens: true
    conform_id_token_claims: false
    allow_omitting_single_registered_redirect_uri: true
    enable_http_post_methods: false
    expires_with_session: true
    rotate_refresh_token: true
    client_based_cors: true
    clock_tolerance: 15
    acr_values:
      supported:
        - urn:mfa:otp
        - urn:mfa:webauthn
    claims:
      openid:
        - sub
      profile:
        - name
        - family_name
        - given_name
        - picture
        - locale
        - username
      email:
        - email
        - email_verified
      phone:
        - phone_number
        - phone_number_verified
      address:
        - address
    scopes:
      - openid
      - profile
      - email
      - phone
      - address
      - offline_access
    subject_types:
      - public
      - pairwise
    allowOmittingSingleRegisteredRedirectUri: true
    encryption:
      enabled: false
    jwt_response_modes:
      enabled: false
    jwt_userinfo:
      enabled: false
    request_objects:
      enabled: true
    extra_client_metadata:
      properties:
        - allowedResources
        - resourcesScopes
        - isInternalClient
  social_providers:
    enabled: [] # Enable after configuring provider credentials
    available:
      - google
      - github
      - microsoft
      - linkedin
      - facebook
    behavior:
      existing_user_no_integration: require_manual_link
      no_user_account: allow_registration
      missing_contact_info: redirect_to_form
      require_password_on_registration: false
      options:
        allow_multiple_providers: true
        auto_verify_email: true
        show_helpful_errors: false
        max_providers_per_user: 5
    google:
      client_id: ${GOOGLE_CLIENT_ID:-your-google-client-id}
      client_secret: ${GOOGLE_CLIENT_SECRET:-your-google-client-secret}
      discovery_url: https://accounts.google.com/.well-known/openid-configuration
      scopes:
        - openid
        - profile
        - email
    github:
      client_id: ${GITHUB_CLIENT_ID:-your-github-client-id}
      client_secret: ${GITHUB_CLIENT_SECRET:-your-github-client-secret}
      authorization_endpoint: https://github.com/login/oauth/authorize
      token_endpoint: https://github.com/login/oauth/access_token
      userinfo_endpoint: https://api.github.com/user
      scopes:
        - user:email
    microsoft:
      client_id: ${MICROSOFT_CLIENT_ID:-your-microsoft-client-id}
      client_secret: ${MICROSOFT_CLIENT_SECRET:-your-microsoft-client-secret}
      discovery_url: https://login.microsoftonline.com/common/v2.0/.well-known/openid-configuration
      scopes:
        - openid
        - profile
        - email
    linkedin:
      client_id: ${LINKEDIN_CLIENT_ID:-your-linkedin-client-id}
      client_secret: ${LINKEDIN_CLIENT_SECRET:-your-linkedin-client-secret}
      authorization_endpoint: https://www.linkedin.com/oauth/v2/authorization
      token_endpoint: https://www.linkedin.com/oauth/v2/accessToken
      userinfo_endpoint: https://api.linkedin.com/v2/userinfo
      scopes:
        - openid
        - profile
        - email
    facebook:
      client_id: ${FACEBOOK_CLIENT_ID:-your-facebook-client-id}
      client_secret: ${FACEBOOK_CLIENT_SECRET:-your-facebook-client-secret}
      authorization_endpoint: https://www.facebook.com/v19.0/dialog/oauth
      token_endpoint: https://graph.facebook.com/v19.0/oauth/access_token
      userinfo_endpoint: https://graph.facebook.com/me
      scopes:
        - email
        - public_profile
# oidc_storage is computed from bootstrap env vars (STORAGE_ADAPTER, REDIS_*, etc.)
# It is NOT configurable via this file. See .env.example for details.
oidc:
  issuer: http://localhost:9007/oidc/v1
  path: /oidc/v1
  routes:
    authorization: /authorize
    userinfo: /userinfo
    registration: /register-rp
    backchannel_authentication: /backchannel
    challenge: /challenge
    code_verification: /device
    device_authorization: /device/auth
    end_session: /session/end
    introspection: /token/introspection
    jwks: /jwks
    pushed_authorization_request: /request
    revocation: /token/revocation
    token: /token
  secrets:
    pairwise_salt: ${PAIRWISE_SALT:-auto-generated-if-not-set}
  token_ttl:
    access_token: 3600
    authorization_code: 600
    backchannel_auth: 600
    client_credentials: 3600
    device_code: 600
    grant: 3600
    id_token: 3600
    interaction: 600
    refresh_token: 86400
    session: 86400
  discovery:
    claims_locales_supported:
      - en
      - fr
      - es
      - pt
      - de
      - it
      - ru
      - zh
      - ja
      - ko
    display_values_supported:
      - en
      - fr
      - es
      - pt
      - de
      - it
      - ru
      - zh
      - ja
      - ko
    ui_locales_supported:
      - en
      - fr
      - es
      - pt
      - de
      - it
      - ru
      - zh
      - ja
      - ko
    op_policy_uri: ''
    op_tos_uri: ''
    service_documentation: ''
  jwa:
    attest_signing_alg_values:
      - ES256
      - Ed25519
      - EdDSA
    authorization_encryption_alg_values:
      - A128KW
      - A256KW
      - ECDH-ES
      - RSA-OAEP
      - RSA-OAEP-256
      - dir
    authorization_encryption_enc_values:
      - A128CBC-HS256
      - A128GCM
      - A256CBC-HS512
      - A256GCM
    authorization_signing_alg_values:
      - RS256
      - PS256
      - ES256
      - Ed25519
      - EdDSA
    client_auth_signing_alg_values:
      - HS256
      - RS256
      - PS256
      - ES256
      - Ed25519
      - EdDSA
    dpop_signing_alg_values:
      - ES256
      - Ed25519
      - EdDSA
    id_token_encryption_alg_values:
      - A128KW
      - A256KW
      - ECDH-ES
      - RSA-OAEP
      - RSA-OAEP-256
      - dir
    id_token_encryption_enc_values:
      - A128CBC-HS256
      - A128GCM
      - A256CBC-HS512
      - A256GCM
    id_token_signing_alg_values:
      - RS256
      - PS256
      - ES256
      - Ed25519
      - EdDSA
    introspection_encryption_alg_values:
      - A128KW
      - A256KW
      - ECDH-ES
      - RSA-OAEP
      - RSA-OAEP-256
      - dir
    introspection_encryption_enc_values:
      - A128CBC-HS256
      - A128GCM
      - A256CBC-HS512
      - A256GCM
    introspection_signing_alg_values:
      - RS256
      - PS256
      - ES256
      - Ed25519
      - EdDSA
    request_object_encryption_alg_values:
      - A128KW
      - A256KW
      - ECDH-ES
      - RSA-OAEP
      - RSA-OAEP-256
      - dir
    request_object_encryption_enc_values:
      - A128CBC-HS256
      - A128GCM
      - A256CBC-HS512
      - A256GCM
    request_object_signing_alg_values:
      - HS256
      - RS256
      - PS256
      - ES256
      - Ed25519
      - EdDSA
    userinfo_encryption_alg_values:
      - A128KW
      - A256KW
      - ECDH-ES
      - RSA-OAEP
      - RSA-OAEP-256
      - dir
    userinfo_encryption_enc_values:
      - A128CBC-HS256
      - A128GCM
      - A256CBC-HS512
      - A256GCM
    userinfo_signing_alg_values:
      - RS256
      - PS256
      - ES256
      - Ed25519
